name: emvo_core
description: Core domain and dependency abstractions for Emvo.
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  meta: ^1.12.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  get_it: ^7.6.4
  injectable: ^2.3.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  fpdart: ^1.1.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.0
  integration_test:
    sdk: flutter
  emvo_assessment:
    path: ../emvo_assessment
  lints: ^5.1.1
  test: ^1.25.8
  build_runner: ^2.4.7
  injectable_generator: ^2.4.0
  freezed: ^2.4.5
  json_serializable: ^6.7.1
