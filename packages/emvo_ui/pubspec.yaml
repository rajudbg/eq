name: emvo_ui
description: Shared Flutter UI components and themes for Emvo.
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.3.0
  emvo_core:
    path: ../emvo_core
  emvo_assets:
    path: ../emvo_assets
  flutter_riverpod: ^2.4.0
  rive: ^0.12.0
  google_fonts: ^6.1.0
  animations: ^2.0.8
  flutter_animate: ^4.3.0
  fl_chart: ^0.65.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.0
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
