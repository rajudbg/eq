name: emvo_assets
description: Assets package for Emvo (Rive, Lottie, images)
version: 0.0.1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  rive: ^0.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.0
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  assets:
    - assets/rive/
    - assets/lottie/
    - assets/images/
    - assets/icons/
