name: emvo_mobile
description: Emvo mobile app.
publish_to: none

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  emvo_core:
    path: ../../packages/emvo_core
  emvo_ui:
    path: ../../packages/emvo_ui
  emvo_assessment:
    path: ../../packages/emvo_assessment
  emvo_assets:
    path: ../../packages/emvo_assets
  flutter_riverpod: ^2.4.0
  go_router: ^12.0.0
  flutter_animate: ^4.3.0
  animations: ^2.0.8
  rive: ^0.12.0
  fl_chart: ^0.65.0
  shared_preferences: ^2.3.3
  flutter_markdown: ^0.7.7+1
  url_launcher: ^6.3.2
  share_plus: ^7.2.1
  path_provider: ^2.1.1
  in_app_review: ^2.0.8
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  flutter_timezone: ^4.1.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.0
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
