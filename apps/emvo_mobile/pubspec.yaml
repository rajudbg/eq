name: emvo_mobile
description: Emvo mobile app.
publish_to: none

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  emvo_core:
    path: ../../packages/emvo_core
  emvo_ui:
    path: ../../packages/emvo_ui
  emvo_assessment:
    path: ../../packages/emvo_assessment
  emvo_assets:
    path: ../../packages/emvo_assets
  flutter_riverpod: ^2.4.0
  go_router: ^12.0.0
  flutter_animate: ^4.3.0
  animations: ^2.0.8
  rive: ^0.12.0
  fl_chart: ^0.65.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.0
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
